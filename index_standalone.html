    // --- Firebase & LocalStorage Unified State Layer ---
    const CONFIG_KEY = "lovely_prints_firebase_config";
    let firebaseDb = null;
    let firebaseStorage = null;
    let isFirebaseConfigured = false;

    // Load Firebase configuration
    const savedConfig = localStorage.getItem(CONFIG_KEY);
    if (savedConfig) {
      try {
        const parsed = JSON.parse(savedConfig);
        if (parsed.apiKey && parsed.projectId) {
          firebase.initializeApp(parsed);
          firebaseDb = firebase.firestore();
          firebaseStorage = firebase.storage();
          isFirebaseConfigured = true;
        }
      } catch (e) {
        console.error("Firebase standalone setup failed, falling back to LocalStorage:", e);
      }
    }

    // Storage access methods
    const getLocalCategories = () => {
      const saved = localStorage.getItem("lovely_prints_categories");
      if (!saved) {
        localStorage.setItem("lovely_prints_categories", JSON.stringify(INITIAL_CATEGORIES));
        return INITIAL_CATEGORIES;
      }
      return JSON.parse(saved);
    };

    const saveLocalCategories = (cats) => localStorage.setItem("lovely_prints_categories", JSON.stringify(cats));

    const getLocalProducts = () => {
      const saved = localStorage.getItem("lovely_prints_products");
      if (!saved) {
        localStorage.setItem("lovely_prints_products", JSON.stringify(INITIAL_PRODUCTS));
        return INITIAL_PRODUCTS;
      }
      return JSON.parse(saved);
    };

    const saveLocalProducts = (prods) => localStorage.setItem("lovely_prints_products", JSON.stringify(prods));

    const getStoredCategories = async () => {
      if (isFirebaseConfigured && firebaseDb) {
        try {
          const snapshot = await firebaseDb.collection("categories").get();
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          if (items.length === 0) {
            for (const cat of INITIAL_CATEGORIES) {
              await firebaseDb.collection("categories").doc(cat.id).set({
                name: cat.name,
                description: cat.description,
                imageUrl: cat.imageUrl
              });
              items.push(cat);
            }
          }
          return items;
        } catch (e) {
          console.error("Firestore categories error, using LocalStorage:", e);
          return getLocalCategories();
        }
      }
      return getLocalCategories();
    };

    const getStoredProducts = async () => {
      if (isFirebaseConfigured && firebaseDb) {
        try {
          const snapshot = await firebaseDb.collection("products").get();
          const items = [];
          snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          if (items.length === 0) {
            for (const prod of INITIAL_PRODUCTS) {
              await firebaseDb.collection("products").doc(prod.id).set({
                categoryId: prod.categoryId,
                name: prod.name,
                description: prod.description,
                price: prod.price,
                imageUrl: prod.imageUrl
              });
              items.push(prod);
            }
          }
          return items;
        } catch (e) {
          console.error("Firestore products error, using LocalStorage:", e);
          return getLocalProducts();
        }
      }
      return getLocalProducts();
    };

    // --- AdminPanel Component ---
    function AdminPanel({ 
      categories, 
      products, 
      onSaveCategory, 
      onDeleteCategory, 
      onSaveProduct, 
      onDeleteProduct 
    }) {
      const [isAuthenticated, setIsAuthenticated] = useState(() => {
        return sessionStorage.getItem('admin_authenticated') === 'true';
      });
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [activeTab, setActiveTab] = useState('products');
      
      const [catEditing, setCatEditing] = useState(null);
      const [catName, setCatName] = useState('');
      const [catDesc, setCatDesc] = useState('');
      const [catImage, setCatImage] = useState('');
      const [catFormOpen, setCatFormOpen] = useState(false);
      
      const [prodEditing, setProdEditing] = useState(null);
      const [prodCategoryId, setProdCategoryId] = useState('');
      const [prodName, setProdName] = useState('');
      const [prodDesc, setProdDesc] = useState('');
      const [prodPrice, setProdPrice] = useState('');
      const [prodImage, setProdImage] = useState('');
      const [prodFormOpen, setProdFormOpen] = useState(false);
      const [isUploading, setIsUploading] = useState(false);

      const [firebaseKeys, setFirebaseKeys] = useState(() => {
        const active = localStorage.getItem(CONFIG_KEY);
        return active ? JSON.stringify(JSON.parse(active), null, 2) : '';
      });
      const [saveStatus, setSaveStatus] = useState('');

      // Auto compression
      const handleImageUpload = (file, callback) => {
        if (!file) return;
        setIsUploading(true);
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxDim = 600;
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxDim) { height *= maxDim / width; width = maxDim; }
            } else {
              if (height > maxDim) { width *= maxDim / height; height = maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const compressed = canvas.toDataURL('image/jpeg', 0.75);
            setIsUploading(false);
            callback(compressed);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleCatSubmit = async (e) => {
        e.preventDefault();
        const catId = catEditing || `cat-${Date.now()}`;
        await onSaveCategory({
          id: catId,
          name: catName,
          description: catDesc,
          imageUrl: catImage || 'https://images.unsplash.com/photo-1561070791-26c113006238?w=800'
        });
        setCatFormOpen(false);
      };

      const handleProdSubmit = async (e) => {
        e.preventDefault();
        const prodId = prodEditing || `prod-${Date.now()}`;
        let finalUrl = prodImage;

        if (isFirebaseConfigured && firebaseStorage && prodImage.startsWith('data:image/')) {
          setIsUploading(true);
          try {
            const ref = firebaseStorage.ref().child(`products/${prodId}`);
            await ref.putString(prodImage, 'data_url');
            finalUrl = await ref.getDownloadURL();
          } catch (e) {
            console.error("Firebase Storage upload failed, keeping Base64:", e);
          } finally {
            setIsUploading(false);
          }
        }

        await onSaveProduct({
          id: prodId,
          categoryId: prodCategoryId || categories[0]?.id,
          name: prodName,
          description: prodDesc,
          price: prodPrice,
          imageUrl: finalUrl || 'https://images.unsplash.com/photo-1562157873-818bc0726f68?w=800'
        });
        setProdFormOpen(false);
      };

      const handleKeysSubmit = (e) => {
        e.preventDefault();
        try {
          const parsed = JSON.parse(firebaseKeys);
          localStorage.setItem(CONFIG_KEY, JSON.stringify(parsed));
          setSaveStatus('success');
          setTimeout(() => window.location.reload(), 1000);
        } catch (err) {
          setSaveStatus('error');
        }
      };

      const handleDisconnect = () => {
        if (confirm("Disconnect Cloud DB?")) {
          localStorage.removeItem(CONFIG_KEY);
          window.location.reload();
        }
      };

      if (!isAuthenticated) {
        const handleLoginSubmit = (e) => {
          e.preventDefault();
          if (passwordInput === 'selvaraj123') {
            sessionStorage.setItem('admin_authenticated', 'true');
            setIsAuthenticated(true);
            setLoginError(false);
          } else {
            setLoginError(true);
          }
        };

        return (
          <div className="container" style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '60vh', padding: '4rem 0' }}>
            <div style={{ backgroundColor: 'var(--white)', border: '1px solid var(--primary-soft)', borderRadius: 'var(--radius-lg)', padding: '3rem', width: '100%', maxWidth: '420px', boxShadow: 'var(--shadow-xl)', textAlign: 'center' }}>
              <div style={{ width: '4rem', height: '4rem', borderRadius: '50%', backgroundColor: 'var(--primary-light)', color: 'var(--primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 1.5rem auto' }}>
                <IconLock size={32} />
              </div>
              <h2 style={{ fontSize: '1.75rem', marginBottom: '0.5rem', color: 'var(--primary-dark)' }}>Admin Access</h2>
              <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '2rem' }}>Please enter passcode to unlock the management console.</p>
              
              <form onSubmit={handleLoginSubmit}>
                <div className="form-group" style={{ textAlign: 'left', position: 'relative' }}>
                  <label className="form-label">Password</label>
                  <div style={{ position: 'relative' }}>
                    <input 
                      type={showPassword ? "text" : "password"} 
                      className="form-control" 
                      value={passwordInput} 
                      onChange={(e) => setPasswordInput(e.target.value)} 
                      placeholder="Enter passcode"
                      style={{ paddingRight: '2.5rem' }}
                      required
                    />
                    <button 
                      type="button" 
                      onClick={() => setShowPassword(!showPassword)}
                      style={{ position: 'absolute', right: '0.75rem', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', display: 'flex', alignItems: 'center' }}
                    >
                      <IconEye size={16} />
                    </button>
                  </div>
                  {loginError && (
                    <div style={{ color: '#ef4444', fontSize: '0.8rem', marginTop: '0.5rem', display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                      <IconAlertCircle size={14} />
                      Incorrect password. (Try default: selvaraj123)
                    </div>
                  )}
                </div>
                
                <button type="submit" className="btn-primary" style={{ width: '100%', justifyContent: 'center', marginTop: '1.5rem' }}>
                  Unlock Dashboard
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="container admin-container">
          <div className="admin-header">
            <div>
              <span className="badge" style={{ marginBottom: '0.5rem' }}>Management Console</span>
              <h1 style={{ fontSize: '2rem' }}>Control Panel</h1>
            </div>
            <div className={`admin-status ${isFirebaseConfigured ? 'status-cloud' : 'status-demo'}`}>
              <IconDatabase size={16} />
              {isFirebaseConfigured ? 'Connected to Firebase Cloud DB' : 'Using Local Browser Storage'}
            </div>
          </div>

          <div className="admin-layout">
            <aside className="admin-sidebar">
              <button className={`admin-tab-btn ${activeTab === 'products' ? 'active' : ''}`} onClick={() => { setActiveTab('products'); setProdFormOpen(false); }}>
                <IconEye size={18} /> Manage Products
              </button>
              <button className={`admin-tab-btn ${activeTab === 'categories' ? 'active' : ''}`} onClick={() => { setActiveTab('categories'); setCatFormOpen(false); }}>
                <IconSettings size={18} /> Manage Categories
              </button>
              <button className={`admin-tab-btn ${activeTab === 'firebase' ? 'active' : ''}`} onClick={() => setActiveTab('firebase')}>
                <IconDatabase size={18} /> Database Settings
              </button>
              <button className="admin-tab-btn" onClick={() => { sessionStorage.removeItem('admin_authenticated'); setIsAuthenticated(false); }} style={{ marginTop: '2rem', color: '#ef4444', borderTop: '1px solid var(--gray-border)', paddingTop: '1rem', borderRadius: '0' }}>
                <IconLogOut size={18} /> Lock Console
              </button>
            </aside>

            <main className="admin-content-panel">
              {activeTab === 'products' && (
                !prodFormOpen ? (
                  <div>
                    <div className="panel-header">
                      <h2 className="panel-title">All Products ({products.length})</h2>
                      <button className="btn-primary" onClick={() => { setProdEditing(null); setProdCategoryId(categories[0]?.id); setProdName(''); setProdDesc(''); setProdPrice(''); setProdImage(''); setProdFormOpen(true); }}>
                        <IconPlus size={16} /> Add Product
                      </button>
                    </div>
                    <table className="admin-table">
                      <thead>
                        <tr>
                          <th>Image</th>
                          <th>Name</th>
                          <th>Category</th>
                          <th>Price</th>
                          <th>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {products.map(p => (
                          <tr key={p.id}>
                            <td><img src={p.imageUrl} alt={p.name} width="40" height="40" style={{ objectFit: 'cover', borderRadius: '4px' }} /></td>
                            <td style={{ fontWeight: 600 }}>{p.name}</td>
                            <td><span className="badge-category">{categories.find(c => c.id === p.categoryId)?.name || 'Unknown'}</span></td>
                            <td><strong>{p.price || 'Contact'}</strong></td>
                            <td>
                              <div className="action-btns">
                                <button className="btn-icon" onClick={() => { setProdEditing(p.id); setProdCategoryId(p.categoryId); setProdName(p.name); setProdDesc(p.description); setProdPrice(p.price || ''); setProdImage(p.imageUrl); setProdFormOpen(true); }}><IconEdit size={14} /></button>

                ) : (
                  <form onSubmit={handleProdSubmit}>

                    <div className="form-group" style={{ marginTop: '1rem' }}>
                      <label className="form-label">Category</label>
                      <select className="form-control" value={prodCategoryId} onChange={e => setProdCategoryId(e.target.value)}>
                        {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}

                    </div>

                    <div className="form-group">
                      <label className="form-label">Product Name</label>
                      <input type="text" className="form-control" value={prodName} onChange={e => setProdName(e.target.value)} required />
                    </div>

                    <div className="form-group">
                      <label className="form-label">Price</label>
                      <input type="text" className="form-control" value={prodPrice} onChange={e => setProdPrice(e.target.value)} placeholder="e.g. ₹30 / card" />

                    <div className="form-group">
                      <label className="form-label">Image Upload</label>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                        <div>
                          <div className={`image-upload-area ${prodImage ? 'has-image' : ''}`}>
                            {prodImage ? <img src={prodImage} className="upload-preview" /> : <div className="upload-placeholder"><IconUpload size={24} /><div>Select Gallery Image</div></div>}
                            <input type="file" accept="image/*" id="standalone-file" style={{ display: 'none' }} onChange={e => handleImageUpload(e.target.files[0], setProdImage)} />
                            <button type="button" className="btn-secondary" style={{ fontSize: '0.8rem', padding: '0.25rem 0.5rem', margin: '0.5rem auto' }} onClick={() => document.getElementById('standalone-file').click()}>Browse File</button>
                          </div>

                  </form>

              {activeTab === 'categories' && (

                  </p>
                  <div className="form-group">
                    <textarea className="form-control" style={{ fontFamily: 'monospace', fontSize: '0.8rem', minHeight: '150px' }} value={firebaseKeys} onChange={e => setFirebaseKeys(e.target.value)} placeholder='{"apiKey": "...", "projectId": "..."}' required />
                  </div>
                  {saveStatus === 'success' && <div style={{ color: '#10b981', fontWeight: 600, marginBottom: '1rem' }}>✓ Saved! Refreshing connection...</div>}
                  {saveStatus === 'error' && <div style={{ color: '#ef4444', fontWeight: 600, marginBottom: '1rem' }}>✗ Invalid JSON brackets.</div>}
                  <div style={{ display: 'flex', gap: '1rem' }}>
                    <button type="submit" className="btn-primary">Save Config & Connect</button>
                    {isFirebaseConfigured && <button type="button" className="btn-secondary" style={{ color: '#ef4444', borderColor: '#fca5a5' }} onClick={handleDisconnect}><IconLogOut size={14} /> Disconnect</button>}
                  </div>
                </form>
              )}
            </main>
          </div>
        </div>
      );
    }

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('home');
      const [catId, setCatId] = useState(null);
      const [categories, setCategories] = useState([]);
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        async function fetchAll() {
          setLoading(true);
          const cats = await getStoredCategories();
          const prods = await getStoredProducts();
          setCategories(cats);
          setProducts(prods);
          setLoading(false);
        }
        fetchAll();
      }, []);

      const saveCategory = async (newCat) => {
        if (isFirebaseConfigured && firebaseDb) {
          await firebaseDb.collection("categories").doc(newCat.id).set({
            name: newCat.name,
            description: newCat.description,
            imageUrl: newCat.imageUrl
          });
        }
        const cats = getLocalCategories();
        const idx = cats.findIndex(c => c.id === newCat.id);
        if (idx > -1) cats[idx] = newCat; else cats.push(newCat);
        saveLocalCategories(cats);
        setCategories(await getStoredCategories());
      };

      const deleteCategory = async (id) => {
        if (isFirebaseConfigured && firebaseDb) {
          await firebaseDb.collection("categories").doc(id).delete();
          // Delete category products
          const snapshot = await firebaseDb.collection("products").where("categoryId", "==", id).get();
          snapshot.forEach(doc => doc.ref.delete());
        }
        const cats = getLocalCategories().filter(c => c.id !== id);
        saveLocalCategories(cats);
        const prods = getLocalProducts().filter(p => p.categoryId !== id);
        saveLocalProducts(prods);
        setCategories(await getStoredCategories());
        setProducts(await getStoredProducts());
      };

      const saveProduct = async (newProd) => {
        if (isFirebaseConfigured && firebaseDb) {
          await firebaseDb.collection("products").doc(newProd.id).set({
            categoryId: newProd.categoryId,
            name: newProd.name,
            description: newProd.description,
            price: newProd.price,
            imageUrl: newProd.imageUrl
          });
        }
        const prods = getLocalProducts();
        const idx = prods.findIndex(p => p.id === newProd.id);
        if (idx > -1) prods[idx] = newProd; else prods.push(newProd);
        saveLocalProducts(prods);
        setProducts(await getStoredProducts());
      };

      const deleteProduct = async (id) => {
        if (isFirebaseConfigured && firebaseDb) {
          await firebaseDb.collection("products").doc(id).delete();
        }
        const prods = getLocalProducts().filter(p => p.id !== id);
        saveLocalProducts(prods);
        setProducts(await getStoredProducts());
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
          <Header currentView={view} setCurrentView={setView} />
          
          {loading ? (
            <div style={{ flexGrow: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '400px', gap: '1rem' }}>
              <div style={{ width: '40px', height: '40px', border: '4px solid var(--primary-light)', borderTopColor: 'var(--primary)', borderRadius: '50%', animation: 'spin 1s linear infinite' }}></div>
              <p style={{ color: 'var(--text-muted)', fontWeight: 500 }}>Loading LOVELY PRINTS...</p>
            </div>
          ) : (
            <main style={{ flexGrow: 1 }}>
              {view === 'home' && (
                <>
                  <Hero 
                    onExploreClick={() => document.getElementById('services')?.scrollIntoView({ behavior: 'smooth' })}
                    onContactClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })}
                  />
                  <ServicesGrid 
                    categories={categories}
                    onSelect={(id) => { setCatId(id); setView('category'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                  />

                 
                  <ContactSection />
                </>
              )}

              {view === 'category' && (
                <CategoryView 
                  category={categories.find(c => c.id === catId)}
                  products={products.filter(p => p.categoryId === catId)}
                  onBack={() => { setView('home'); setCatId(null); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                />
              )}

              {view === 'admin' && (
                <AdminPanel 
                  categories={categories}
                  products={products}
                  onSaveCategory={saveCategory}
                  onDeleteCategory={deleteCategory}
                  onSaveProduct={saveProduct}
                  onDeleteProduct={deleteProduct}
                />
              )}
            </main>
          )}

          <footer>
            <div className="container footer-grid">
              <div>
                <div className="footer-logo"><IconPrinter size={22} style={{ marginRight: '0.5rem', verticalAlign: 'middle' }} />LOVELY<span> PRINTS</span></div>
                <p className="footer-desc">Your one-stop destination for invitation cards, notices, business cards, bags, and apparel printing.</p>
              </div>
              <div>
                <h4 className="footer-title">Our Services</h4>
                <ul className="footer-links">
                  {categories.map(c => (
                    <li key={c.id}><a href="#" onClick={(e) => { e.preventDefault(); setCatId(c.id); setView('category'); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>{c.name}</a></li>
                  ))}
                </ul>
              </div>
              <div>
                <h4 className="footer-title">Contact Info</h4>
                <ul className="footer-links" style={{ color: '#9ca3af', fontSize: '0.9rem' }}>
                  <li style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}><IconPhone size={14} /> +91 96003 72130</li>
                  <li style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}><IconMail size={14} /> venkadeshg5509@gmail.com</li>
                  <li style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-start' }}><IconMapPin size={14} style={{ marginTop: '0.2rem' }} /> Opposite Old RTO Office, Chidambaram Main Road, Erukkur, Mayiladuthurai-609108, Tamil Nadu</li>
                </ul>
              </div>
            </div>
            <div className="container footer-bottom">
              <p>© {new Date().getFullYear()} Lovely Prints. All Rights Reserved. Developed by Venkadesh.</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    /* CSS Spin animation placeholder */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
